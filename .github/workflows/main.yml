name: Build CarPlay IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and Compile
        run: |
          # البحث عن ملف الكود في كل مكان
          CODE_FILE=$(find . -name "ContentView.swift" | head -n 1)
          echo "Found code at: $CODE_FILE"
          
          # إنشاء هيكل التطبيق
          mkdir -p Payload/MyCarApp.app
          
          # تجميع الكود المصدري
          xcrun -sdk iphoneos swiftc "$CODE_FILE" \
          -o Payload/MyCarApp.app/MyCarApp \
          -target arm64-apple-ios15.0 \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable

          # إضافة ملف التعريف الأساسي
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>MyCarApp</string><key>CFBundleIdentifier</key><string>com.mym.carplay</string><key>CFBundleName</key><string>MyCarApp</string><key>CFBundleVersion</key><string>1.0</string><key>LSRequiresIPhoneOS</key><true/><key>MinimumOSVersion</key><string>15.0</string></dict></plist>' > Payload/MyCarApp.app/Info.plist

          # ضغط الملف بصيغة IPA
          zip -r MyCarApp.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Final-CarPlay-IPA
          path: MyCarApp.ipa
