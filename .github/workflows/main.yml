name: Build CarPlay Professional IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Full App Structure
        run: |
          # 1. إنشاء ملف التشغيل الرئيسي (المحرك)
          cat <<EOF > App.swift
          import SwiftUI
          import CarPlay

          @main
          struct MyCarApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }

          // هذا الجزء يضمن للسيارة أن التطبيق يدعم واجهات الكار بلاي
          class CarPlaySceneDelegate: UIResponder, CPTemplateApplicationSceneDelegate {
              var interfaceController: CPInterfaceController?

              func templateApplicationScene(_ templateApplicationScene: CPTemplateApplicationScene, didConnect interfaceController: CPInterfaceController) {
                  self.interfaceController = interfaceController
                  let item = CPListItem(text: "عداد السرعة", detailText: "عرض السرعة الحالية")
                  let section = CPListSection(items: [item])
                  let listTemplate = CPListTemplate(title: "MyCarApp", sections: [section])
                  interfaceController.setRootTemplate(listTemplate, animated: true, completion: nil)
              }
          }
          EOF

          # 2. تجميع الملفات (App + Content)
          xcrun -sdk iphoneos swiftc App.swift ContentView.swift \
          -o MyCarApp \
          -target arm64-apple-ios15.0 \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable

          # 3. تجهيز المجلد
          mkdir -p Payload/MyCarApp.app
          mv MyCarApp Payload/MyCarApp.app/
          
          # 4. إنشاء ملف Info.plist (المفتاح السري للظهور في الكار بلاي والـ GPS)
          cat <<EOF > Payload/MyCarApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MyCarApp</string>
              <key>CFBundleIdentifier</key> <string>com.mym.carplayzero</string>
              <key>CFBundleName</key> <string>MyCarApp</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
              <key>CFBundleVersion</key> <string>1</string>
              <key>LSRequiresIPhoneOS</key> <true/>
              <key>MinimumOSVersion</key> <string>15.0</string>
              
              <key>NSLocationWhenInUseUsageDescription</key>
              <string>نحتاج للموقع لحساب السرعة في العداد أثناء القيادة</string>
              
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UISceneConfigurations</key>
                  <dict>
                      <key>UIWindowSceneSessionRoleApplication</key>
                      <array>
                          <dict>
                              <key>UISceneDelegateClassName</key>
                              <string>\$(PRODUCT_MODULE_NAME).SceneDelegate</string>
                          </dict>
                      </array>
                      <key>CPTemplateApplicationSceneSessionRoleApplication</key>
                      <array>
                          <dict>
                              <key>UISceneConfigurationName</key>
                              <string>CarPlay</string>
                              <key>UISceneDelegateClassName</key>
                              <string>\$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate</string>
                          </dict>
                      </array>
                  </dict>
              </dict>
          </dict>
          </plist>
          EOF

          # 5. ضغط الملف بصيغة IPA
          zip -r MyCarApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Full-CarPlay-IPA
          path: MyCarApp.ipa
