name: Build Waze-Spoof Dash
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Spoof App Files
        run: |
          # 1. المحرك الأساسي
          cat <<EOF > App.swift
          import SwiftUI
          @main
          struct MyCarApp: App {
              var body: some Scene {
                  WindowGroup { ContentView() }
              }
          }
          EOF

          # 2. ملف الربط مع CarPlay
          cat <<EOF > CarPlayScene.swift
          import UIKit
          import CarPlay

          class CarPlaySceneDelegate: UIResponder, CPTemplateApplicationSceneDelegate {
              func templateApplicationScene(_ templateApplicationScene: CPTemplateApplicationScene, didConnect interfaceController: CPInterfaceController) {
              }
          }
          EOF

      - name: Compile with Waze Identity
        run: |
          xcrun -sdk iphoneos swiftc App.swift ContentView.swift CarPlayScene.swift \
          -o MyCarApp \
          -target arm64-apple-ios15.0 \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable

      - name: Structure Spoof IPA
        run: |
          mkdir -p Payload/Waze.app
          mv MyCarApp Payload/Waze.app/Waze
          
          # 3. ملف Info.plist (هنا تقع خدعة الانتحال)
          cat <<EOF > Payload/Waze.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>Waze</string>
              <key>CFBundleIdentifier</key> <string>com.waze.iphone</string>
              <key>CFBundleName</key> <string>Waze</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>4.93.1</string>
              <key>CFBundleVersion</key> <string>4.93.1.0</string>
              <key>LSRequiresIPhoneOS</key> <true/>
              <key>MinimumOSVersion</key> <string>15.0</string>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UISceneConfigurations</key>
                  <dict>
                      <key>CPTemplateApplicationSceneSessionRoleApplication</key>
                      <array>
                          <dict>
                              <key>UISceneDelegateClassName</key>
                              <string>MyCarApp.CarPlaySceneDelegate</string>
                          </dict>
                      </array>
                  </dict>
              </dict>
          </dict>
          </plist>
          EOF

          zip -r WazeSpoof.ipa Payload

      - name: Upload Spoof IPA
        uses: actions/upload-artifact@v4
        with:
          name: Waze-Spoof-IPA
          path: WazeSpoof.ipa
