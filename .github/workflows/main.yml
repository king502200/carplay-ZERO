name: Build Stable CarPlay IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Full App Structure
        run: |
          # 1. إنشاء ملف المحرك (Main App)
          cat <<EOF > App.swift
          import SwiftUI
          @main
          struct MyCarApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

          # 2. تجميع كل الملفات معاً (App + Content)
          xcrun -sdk iphoneos swiftc App.swift ContentView.swift \
          -o MyCarApp \
          -target arm64-apple-ios15.0 \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable

          # 3. تجهيز المجلد النهائي
          mkdir -p Payload/MyCarApp.app
          mv MyCarApp Payload/MyCarApp.app/
          
          # 4. إضافة ملف Info.plist كامل الإعدادات
          cat <<EOF > Payload/MyCarApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MyCarApp</string>
              <key>CFBundleIdentifier</key> <string>com.mym.carplayzero</string>
              <key>CFBundleName</key> <string>MyCarApp</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
              <key>CFBundleVersion</key> <string>1</string>
              <key>LSRequiresIPhoneOS</key> <true/>
              <key>MinimumOSVersion</key> <string>15.0</string>
              <key>UILaunchScreen</key> <dict/>
          </dict>
          </plist>
          EOF

          # 5. الضغط النهائي
          zip -r MyCarApp.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Fixed-CarPlay-IPA
          path: MyCarApp.ipa
