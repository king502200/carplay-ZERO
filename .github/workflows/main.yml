name: Build Final CarPlay App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Files
        run: |
          # إنشاء ملفات التطبيق
          cat <<EOF > App.swift
          import SwiftUI
          @main
          struct MyCarApp: App {
              var body: some Scene { WindowGroup { ContentView() } }
          }
          EOF

          cat <<EOF > CarPlayScene.swift
          import UIKit
          import CarPlay
          class CarPlaySceneDelegate: UIResponder, CPTemplateApplicationSceneDelegate {
              func templateApplicationScene(_ s: CPTemplateApplicationScene, didConnect c: CPInterfaceController) {}
          }
          EOF

      - name: Build Binary
        run: |
          xcrun -sdk iphoneos swiftc App.swift ContentView.swift CarPlayScene.swift \
          -o MyCarApp -target arm64-apple-ios15.0 \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) -emit-executable

      - name: Package IPA
        run: |
          mkdir -p Payload/MyDash.app
          mv MyCarApp Payload/MyDash.app/MyDash
          if [ -f "AppIcon.png" ]; then cp AppIcon.png Payload/MyDash.app/AppIcon.png; fi

          cat <<EOF > Payload/MyDash.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MyDash</string>
              <key>CFBundleIdentifier</key> <string>com.mym.dashboard.final</string>
              <key>CFBundleName</key> <string>MyDash</string>
              <key>CFBundleIconFile</key> <string>AppIcon.png</string>
              <key>NSLocationWhenInUseUsageDescription</key> <string>لحساب السرعة</string>
              <key>UIBackgroundModes</key> <array><string>location</string></array>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UISceneConfigurations</key>
                  <dict>
                      <key>CPTemplateApplicationSceneSessionRoleApplication</key>
                      <array><dict><key>UISceneDelegateClassName</key><string>MyDash.CarPlaySceneDelegate</string></dict></array>
                  </dict>
              </dict>
          </dict>
          </plist>
          EOF
          zip -r MyDash.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Final-Build-With-Icon
          path: MyDash.ipa
