name: Build CarPlay Navigation IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Navigation App Files
        run: |
          # 1. المحرك الأساسي
          cat <<EOF > App.swift
          import SwiftUI
          @main
          struct MyCarApp: App {
              var body: some Scene {
                  WindowGroup { ContentView() }
              }
          }
          EOF

          # 2. ملف تعريف الملاحة (ضروري للظهور في السيارة)
          cat <<EOF > CarPlayScene.swift
          import UIKit
          import CarPlay

          class CarPlaySceneDelegate: UIResponder, CPTemplateApplicationSceneDelegate {
              func templateApplicationScene(_ templateApplicationScene: CPTemplateApplicationScene, didConnect interfaceController: CPInterfaceController) {
              }
          }
          EOF

      - name: Compile Navigation Build
        run: |
          xcrun -sdk iphoneos swiftc App.swift ContentView.swift CarPlayScene.swift \
          -o MyCarApp \
          -target arm64-apple-ios15.0 \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable

      - name: Structure Navigation IPA
        run: |
          mkdir -p Payload/MyCarApp.app
          mv MyCarApp Payload/MyCarApp.app/
          
          # 3. ملف Info.plist (إضافة تصريح الملاحة)
          cat <<EOF > Payload/MyCarApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MyCarApp</string>
              <key>CFBundleIdentifier</key> <string>com.mym.navigation.dash</string>
              <key>CFBundleName</key> <string>MyDash</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
              <key>CFBundleVersion</key> <string>1</string>
              <key>LSRequiresIPhoneOS</key> <true/>
              <key>MinimumOSVersion</key> <string>15.0</string>
              <key>UIBackgroundModes</key>
              <array>
                  <string>location</string>
              </array>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UISceneConfigurations</key>
                  <dict>
                      <key>CPTemplateApplicationSceneSessionRoleApplication</key>
                      <array>
                          <dict>
                              <key>UISceneDelegateClassName</key>
                              <string>MyCarApp.CarPlaySceneDelegate</string>
                          </dict>
                      </array>
                  </dict>
              </dict>
          </dict>
          </plist>
          EOF

          zip -r MyCarNav.ipa Payload

      - name: Upload Navigation IPA
        uses: actions/upload-artifact@v4
        with:
          name: CarPlay-Navigation-Final
          path: MyCarNav.ipa
